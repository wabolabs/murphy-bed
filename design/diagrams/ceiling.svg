<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 650" width="100%">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
      .dim { fill: #d32f2f; font-size: 11px; text-anchor: middle; }
      .dim2 { fill: #1565c0; font-size: 11px; text-anchor: middle; }
      .label { font-size: 10px; fill: #333; }
      .title { font-size: 16px; fill: #333; font-weight: bold; }
      .subtitle { font-size: 12px; fill: #555; }
      .hl { font-size: 10px; fill: #1565c0; font-weight: bold; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#d32f2f"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4Z" fill="#1565c0"/>
    </marker>
  </defs>

  <text x="600" y="28" text-anchor="middle" class="title">Updated: Ceiling Rough Opening — Minimum Recess</text>
  <text x="600" y="46" text-anchor="middle" class="subtitle">Recess depth: 5/8 in (17 mm) — no header needed, just trim out the opening</text>

  <!-- ─────────── Plan View of Rough Opening ─────────── -->
  <text x="280" y="80" text-anchor="middle" class="hl">Plan View — Ceiling Rough Opening</text>

  <!-- Ceiling drywall -->
  <rect x="60" y="95" width="440" height="380" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="280" y="288" text-anchor="middle" class="label" transform="rotate(-30,280,288)">Existing Ceiling Drywall</text>

  <!-- Rough opening -->
  <rect x="100" y="130" width="360" height="310" fill="#fff" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="280" y="140" class="dim" font-size="9">Rough Opening</text>

  <!-- Width dimension -->
  <line x1="100" y1="470" x2="460" y2="470" stroke="#888" stroke-width="0.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="280" y="483" class="dim">67.5 in (1715 mm)</text>

  <!-- Joists (assumed direction) -->
  <line x1="100" y1="200" x2="460" y2="200" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,8"/>
  <line x1="100" y1="260" x2="460" y2="260" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,8"/>
  <line x1="100" y1="320" x2="460" y2="320" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,8"/>
  <line x1="100" y1="380" x2="460" y2="380" stroke="#aaa" stroke-width="0.5" stroke-dasharray="3,8"/>

  <!-- Joist label -->
  <text x="400" y="435" class="label" fill="#888">Joists (16 in / 406 mm OC)</text>

  <!-- Depth dimension -->
  <line x1="80" y1="130" x2="80" y2="440" stroke="#888" stroke-width="0.5" marker-start="url(#arr2)" marker-end="url(#arr2)"/>
  <text x="70" y="290" class="dim2" transform="rotate(-90,70,290)">18 in (457 mm)</text>

  <!-- Callout: no structural header needed -->
  <g transform="translate(560,130)">
    <rect x="0" y="0" width="580" height="100" rx="8" fill="#fffbe6" stroke="#e0c84a" stroke-width="1.5"/>
    <text x="15" y="22" class="hl">Minimum Recess — No Header Required!</text>
    <text x="15" y="40" class="label" font-size="11">With 3/4 in (18 mm) OSB cabinet panels, external height is only 84.25 in (2138 mm).</text>
    <text x="15" y="58" class="label" font-size="11">Ceiling height is 83.5 in (2121 mm), so the recess is just 5/8 in (17 mm).</text>
    <text x="15" y="76" class="label" font-size="11">This is purely finish-trim depth — no need to cut joists or install a header.</text>
    <text x="15" y="94" class="label" font-size="11">Just open the drywall, add blocking between joists for trim attachment, and paint.</text>
  </g>

  <!-- ─────────── Ceiling Trim Detail ─────────── -->
  <text x="280" y="540" text-anchor="middle" class="hl">Section: Cabinet-Ceiling Interface</text>

  <!-- Cabinet top -->
  <rect x="60" y="580" width="340" height="30" fill="#d4a76a" stroke="#333" stroke-width="1.5"/>
  <text x="230" y="599" text-anchor="middle" class="label">Cabinet Top (3/4 in OSB)</text>

  <!-- Ceiling drywall -->
  <rect x="60" y="550" width="400" height="12" fill="#f5f5f5" stroke="#999" stroke-width="1"/>
  <text x="260" y="561" text-anchor="middle" class="label">Ceiling Drywall</text>

  <!-- Cabinet side extending above -->
  <rect x="60" y="520" width="30" height="60" fill="#d4a76a" stroke="#333" stroke-width="1.5"/>
  <text x="75" y="555" text-anchor="middle" class="label" transform="rotate(-90,75,555)">Cabinet Side (OSB) extends into recess</text>

  <!-- Blocking -->
  <rect x="130" y="510" width="200" height="20" fill="#c0a070" stroke="#333" stroke-width="1"/>
  <text x="230" y="524" text-anchor="middle" class="label">Blocking between joists</text>

  <!-- Recess dimension -->
  <line x1="460" y1="550" x2="460" y2="520" stroke="#888" stroke-width="0.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="472" y="538" class="dim" text-anchor="start">0.65 in (17 mm) recess</text>

  <!-- Trim -->
  <rect x="380" y="580" width="50" height="20" fill="#e0d0b0" stroke="#333" stroke-width="1"/>
  <rect x="380" y="550" width="50" height="12" fill="#e0d0b0" stroke="#333" stroke-width="1"/>
  <text x="405" y="593" text-anchor="middle" class="label">Trim</text>

</svg>