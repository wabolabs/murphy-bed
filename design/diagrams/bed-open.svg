<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="100%">
  <defs>
    <style>
      text { font-family: Arial, sans-serif; }
      .dim { fill: #d32f2f; font-size: 11px; text-anchor: middle; }
      .dim2 { fill: #1565c0; font-size: 11px; text-anchor: middle; }
      .label { font-size: 10px; fill: #333; }
      .title { font-size: 16px; fill: #333; font-weight: bold; }
      .subtitle { font-size: 12px; fill: #555; }
    </style>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6Z" fill="#d32f2f"/>
    </marker>
  </defs>

  <text x="600" y="28" text-anchor="middle" class="title">Updated: Bed in Open Position — Cost-Optimized Design</text>
  <text x="600" y="46" text-anchor="middle" class="subtitle">OSB cabinet: 66.5 W × 16 D × 84.25 H in (1690 × 406 × 2138 mm)</text>

  <!-- ─────────── Side View ─────────── -->

  <!-- Cabinet -->
  <rect x="80" y="60" width="30" height="580" fill="#d4a76a" stroke="#333" stroke-width="1.5"/>
  <text x="95" y="355" text-anchor="middle" class="label" transform="rotate(-90,95,355)">Cabinet Side (OSB)</text>

  <!-- Back panel -->
  <rect x="110" y="60" width="16" height="580" fill="#dbcca8" stroke="#333" stroke-width="1"/>

  <!-- Bottom of cabinet -->
  <rect x="80" y="624" width="46" height="16" fill="#d4a76a" stroke="#333" stroke-width="1"/>

  <!-- Floor -->
  <rect x="30" y="640" width="600" height="8" fill="none" stroke="#555" stroke-width="1"/>
  <text x="320" y="655" text-anchor="middle" class="label">Floor</text>

  <!-- Malm side rail (rotated down) -->
  <g transform="rotate(-5, 120, 310)">
    <rect x="110" y="100" width="450" height="14" fill="#c8a87c" stroke="#555" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="335" y="112" text-anchor="middle" class="label" font-size="8">Malm Side Rail (rotated down for reference)</text>
  </g>

  <!-- Actual bed position (pivoted) -->
  <!-- Pivot point -->
  <circle cx="120" cy="310" r="5" fill="#d32f2f"/>

  <!-- Bed frame in open position -->
  <rect x="120" y="300" width="680" height="50" fill="#c8a87c" stroke="#555" stroke-width="1.5" rx="3" opacity="0.8"/>
  <text x="460" y="330" text-anchor="middle" class="label">Malm Bed Frame — Open Position</text>

  <!-- Mattress -->
  <rect x="120" y="260" width="680" height="40" fill="#e8e0d0" stroke="#999" stroke-width="1" rx="5"/>
  <text x="460" y="285" text-anchor="middle" class="label">Mattress (60 × 80 in / 1525 × 2030 mm, max 10 in / 254 mm thick)</text>

  <!-- Pivot arm / bracket -->
  <line x1="120" y1="310" x2="120" y2="300" stroke="#999" stroke-width="4"/>
  <text x="110" y="295" text-anchor="end" class="label" font-size="9">Pivot pin</text>

  <!-- Gas spring (schematic) -->
  <line x1="95" y1="520" x2="247" y2="380" stroke="#ff9800" stroke-width="3" stroke-dasharray="6,3"/>
  <circle cx="95" cy="520" r="4" fill="#ff9800"/>
  <circle cx="247" cy="380" r="4" fill="#ff9800"/>
  <text x="140" y="490" class="label" fill="#e65100" font-size="9">Gas Spring (schematic)</text>

  <!-- Dimensions -->
  <!-- Cabinet height -->
  <line x1="50" y1="60" x2="50" y2="624" stroke="#888" stroke-width="0.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="40" y="350" class="dim" transform="rotate(-90,40,350)">Cabinet: 84.25 in (2138 mm)</text>

  <!-- Floor to ceiling -->
  <line x1="20" y1="60" x2="20" y2="640" stroke="#888" stroke-width="0.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="12" y="355" class="dim2" transform="rotate(-90,12,355)">Ceiling: 83.5 in (2121 mm)</text>

  <!-- Bed length -->
  <line x1="120" y1="365" x2="800" y2="365" stroke="#888" stroke-width="0.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="460" y="378" class="dim">Bed frame length: 79.5 in (2020 mm)</text>

  <!-- Platform extends past pivot -->
  <line x1="120" y1="385" x2="200" y2="385" stroke="#888" stroke-width="0.5"/>
  <text x="160" y="398" class="dim" font-size="9">Overhang: ~3 in (76 mm)</text>

  <!-- Clearance note -->
  <g transform="translate(610,60)">
    <rect x="0" y="0" width="530" height="60" rx="8" fill="#e8f5e9" stroke="#66bb6a" stroke-width="1.5"/>
    <text x="15" y="20" class="hl">Clearance &amp; Weight</text>
    <text x="15" y="38" class="label" font-size="11">Mattress + frame + hardware must not exceed gas spring rating: ~205 lb (93 kg)</text>
    <text x="15" y="54" class="label" font-size="11">Queen mattress max 68 lb (31 kg) — OSB cabinet is slightly lighter than plywood, helping margin.</text>
  </g>

</svg>